<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- PWA: Meta tags essenciais -->
    <meta name="theme-color" content="#00bcd4">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="TOURSO">
    <link rel="manifest" id="pwa-manifest">

    <title>TOURSO Invest</title>
    <style>
        :root { --fundo: #2c2f33; --card: #36393f; --ciano: #00bcd4; --branco: #ffffff; --alta: #00e676; --queda: #ff6b6b; }
        body { background-color: var(--fundo); color: var(--branco); font-family: sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .card { background-color: var(--card); border-radius: 15px; padding: 20px; width: 100%; max-width: 400px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); margin-bottom: 20px; border-left: 5px solid var(--ciano); }
        .valor-patrimonio { font-size: 2.2em; font-weight: bold; color: var(--ciano); margin: 5px 0; }
        .pilar-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; max-width: 400px; }
        .pilar-card { background-color: var(--card); padding: 15px; border-radius: 10px; text-align: center; border: 1px solid #444; position: relative; overflow: hidden; }
        .pilar-label { font-size: 0.75em; color: #aaa; text-transform: uppercase; }
        .pilar-valor { font-size: 1.1em; font-weight: bold; margin-top: 5px; color: var(--branco); }
        .btn-acao { background-color: var(--ciano); color: var(--fundo); border: none; padding: 15px; border-radius: 8px; font-weight: bold; width: 100%; max-width: 400px; margin-top: 15px; cursor: pointer; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-left: 5px; }
        .input-ninja { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; border: none; cursor: pointer; z-index: 2; }
        .digitando { color: var(--ciano) !important; font-size: 1.3em !important; font-weight: 900 !important; }
        .area-botoes-inferior { display: flex; gap: 10px; justify-content: center; width: 100%; max-width: 400px; margin-top: 30px; }
        .btn-discreto { background: none; border: 1px solid #555; color: #555; font-size: 0.65em; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <svg width="220" height="110" viewBox="0 0 400 220">
        <rect x="80" y="40" width="240" height="15" fill="#00bcd4" />
        <polygon points="200,60 170,110 230,110" fill="#00bcd4" />
        <text x="200" y="165" font-family="Arial" font-size="65" font-weight="bold" fill="white" text-anchor="middle">TOURSO</text>
        <text x="200" y="200" font-family="Arial" font-size="28" fill="#00bcd4" text-anchor="middle">Investimentos</text>
    </svg>

    <div class="card">
        <div style="display:flex; justify-content: space-between; align-items: center;">
            <div class="pilar-label">Patrimônio BBAS3</div>
            <div style="font-size: 0.8em; color: var(--ciano); display: flex; align-items: center; font-weight: bold;">
                R$ <span id="txt-cotacao">24,92</span> <span id="status-bolinha" class="status-dot" style="background: #f1c40f;"></span>
            </div>
        </div>
        <div id="total-acoes-valor" class="valor-patrimonio">R$ 0,00</div>
        <div id="rent-tag" style="font-weight: bold; font-size: 0.9em;">0,00%</div>
        <div style="display: flex; justify-content: space-between; font-size: 0.9em; margin-top: 10px; border-top: 1px solid #444; padding-top: 10px;">
            <span>Ações: <b id="qtd-total">0</b></span>
            <span>PM: <b id="pm-oficial">R$ 0,00</b></span>
        </div>
    </div>

    <div class="card" style="border-left-color: var(--alta);">
        <div class="pilar-label">Saldo em Caixa</div>
        <div id="saldo-caixa" style="font-size: 1.5em; font-weight: bold; margin: 5px 0;">R$ 0,00</div>
        <div id="pode-comprar" style="color: var(--alta); font-size: 0.85em; font-weight: bold;">+0 ações possíveis</div>
    </div>

    <div class="pilar-grid">
        <div class="pilar-card">
            <input type="text" inputmode="decimal" class="input-ninja" oninput="mostrarDigitacao('val-premios', this.value)" onchange="finalizarLancamento('premios', this.value); this.value=''">
            <div class="pilar-label">Prêmios</div><div class="pilar-valor" id="val-premios">R$ 0,00</div>
        </div>
        <div class="pilar-card">
            <input type="text" inputmode="decimal" class="input-ninja" oninput="mostrarDigitacao('val-proventos', this.value)" onchange="finalizarLancamento('proventos', this.value); this.value=''">
            <div class="pilar-label">Proventos</div><div class="pilar-valor" id="val-proventos">R$ 0,00</div>
        </div>
        <div class="pilar-card">
            <input type="text" inputmode="decimal" class="input-ninja" oninput="mostrarDigitacao('val-troco', this.value)" onchange="finalizarLancamento('troco', this.value); this.value=''">
            <div class="pilar-label">Troco/Troca</div><div class="pilar-valor" id="val-troco">R$ 0,00</div>
        </div>
        <div class="pilar-card">
            <input type="text" inputmode="decimal" class="input-ninja" oninput="mostrarDigitacao('val-aportes', this.value)" onchange="finalizarLancamento('aportes', this.value); this.value=''">
            <div class="pilar-label">Aportes</div><div class="pilar-valor" id="val-aportes">R$ 0,00</div>
        </div>
    </div>
    
    <button class="btn-acao" onclick="abrirCompra()">EFETIVAR COMPRA DO CAIXA</button>
    
    <div class="area-botoes-inferior">
        <button onclick="exportar()" class="btn-discreto">BACKUP DADOS</button>
        <button onclick="limparTudo()" class="btn-discreto">ZERAR APLICATIVO</button>
    </div>

    <script>
        // =============================================
        // PWA: Registro do Manifesto via Blob URL
        // =============================================
        (function registrarPWA() {
            // Ícone SVG inline em base64 para o manifesto
            const svgIcon = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
                <rect width="512" height="512" fill="#2c2f33"/>
                <rect x="136" y="100" width="240" height="20" fill="#00bcd4"/>
                <polygon points="256,130 210,210 302,210" fill="#00bcd4"/>
                <text x="256" y="360" font-family="Arial" font-size="130" font-weight="bold" fill="white" text-anchor="middle">T</text>
                <text x="256" y="430" font-family="Arial" font-size="52" fill="#00bcd4" text-anchor="middle">TOURSO</text>
            </svg>`;
            const iconBase64 = 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svgIcon)));

            const manifest = {
                name: "TOURSO Invest",
                short_name: "TOURSO",
                description: "Controle de investimentos BBAS3",
                start_url: "./",
                scope: "./",
                display: "standalone",
                orientation: "portrait",
                background_color: "#2c2f33",
                theme_color: "#00bcd4",
                icons: [
                    { src: iconBase64, sizes: "192x192", type: "image/svg+xml", purpose: "any maskable" },
                    { src: iconBase64, sizes: "512x512", type: "image/svg+xml", purpose: "any maskable" }
                ]
            };

            const blob = new Blob([JSON.stringify(manifest)], { type: 'application/manifest+json' });
            const manifestUrl = URL.createObjectURL(blob);
            document.getElementById('pwa-manifest').href = manifestUrl;
        })();

        // =============================================
        // PWA: Registro do Service Worker via Blob URL
        // =============================================
        if ('serviceWorker' in navigator) {
            const swCode = `
                const CACHE_NAME = 'tourso-v1';
                self.addEventListener('install', event => {
                    self.skipWaiting();
                });
                self.addEventListener('activate', event => {
                    event.waitUntil(self.clients.claim());
                });
                self.addEventListener('fetch', event => {
                    event.respondWith(
                        fetch(event.request).catch(() => {
                            return caches.match(event.request);
                        })
                    );
                });
            `;
            const swBlob = new Blob([swCode], { type: 'text/javascript' });
            const swUrl = URL.createObjectURL(swBlob);
            navigator.serviceWorker.register(swUrl)
                .catch(err => console.warn('SW não registrado (normal em file://):', err));
        }

        // =============================================
        // Lógica do App
        // =============================================
        let dados = JSON.parse(localStorage.getItem('dados_tourso')) || {
            acoes: [],
            caixa: { premios: 0, proventos: 0, troco: 0, aportes: 0 },
            caixaDisponivel: 0
        };
        let cotacaoGlobal = 24.92;

        function converterParaNumero(valorStr) {
            if (!valorStr) return 0;
            return parseFloat(valorStr.replace(',', '.'));
        }

        // Tenta buscar cotação em múltiplos endpoints com fallback
        async function tentarFetch(url, isProxy) {
            const controller = new AbortController();
            const timeout = setTimeout(() => controller.abort(), 6000);
            try {
                const res = await fetch(url, { signal: controller.signal });
                clearTimeout(timeout);
                const json = await res.json();
                const data = isProxy ? JSON.parse(json.contents) : json;
                const preco = data?.results?.[0]?.regularMarketPrice;
                if (preco && !isNaN(preco)) return preco;
                return null;
            } catch (e) {
                clearTimeout(timeout);
                return null;
            }
        }

        async function buscarCotacao() {
            const ticker = 'BBAS3';
            const endpoints = [
                // Tentativa 1: direto na brapi (funciona se tiver CORS liberado)
                { url: `https://brapi.dev/api/quote/${ticker}`, proxy: false },
                // Tentativa 2: proxy allorigins
                { url: `https://api.allorigins.win/get?url=${encodeURIComponent(`https://brapi.dev/api/quote/${ticker}`)}`, proxy: true },
                // Tentativa 3: proxy corsproxy.io
                { url: `https://corsproxy.io/?${encodeURIComponent(`https://brapi.dev/api/quote/${ticker}`)}`, proxy: false },
                // Tentativa 4: proxy thingproxy
                { url: `https://thingproxy.freeboard.io/fetch/https://brapi.dev/api/quote/${ticker}`, proxy: false },
            ];

            for (const ep of endpoints) {
                const preco = await tentarFetch(ep.url, ep.proxy);
                if (preco) {
                    cotacaoGlobal = preco;
                    document.getElementById('txt-cotacao').innerText = cotacaoGlobal.toFixed(2).replace('.', ',');
                    document.getElementById('status-bolinha').style.background = '#00e676'; // verde = online
                    atualizarTela();
                    return;
                }
            }

            // Todos falharam → bolinha amarela, usa último preço salvo
            document.getElementById('status-bolinha').style.background = '#f1c40f';
            atualizarTela();
        }

        function mostrarDigitacao(id, valor) {
            let el = document.getElementById(id);
            el.classList.add('digitando');
            el.innerText = valor ? "R$ " + valor : "R$ 0,00";
        }

        function finalizarLancamento(tipo, valor) {
            let n = converterParaNumero(valor);
            if (!isNaN(n)) {
                dados.caixa[tipo] += n;
                dados.caixaDisponivel += n;
                document.getElementById('val-' + tipo).classList.remove('digitando');
                atualizarTela();
            }
        }

        function atualizarTela() {
            let q = dados.acoes.reduce((acc, a) => acc + a.qtd, 0);
            let c = dados.acoes.reduce((acc, a) => acc + (a.qtd * a.preco), 0);
            let pm = q > 0 ? c / q : 0;
            let val = q * cotacaoGlobal;
            let rent = pm > 0 ? ((cotacaoGlobal - pm) / pm) * 100 : 0;

            document.getElementById('total-acoes-valor').innerText = `R$ ${val.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}`;
            document.getElementById('qtd-total').innerText = q;
            document.getElementById('pm-oficial').innerText = `R$ ${pm.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}`;
            document.getElementById('rent-tag').innerText = `${rent.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}%`;
            document.getElementById('rent-tag').style.color = rent >= 0 ? 'var(--alta)' : 'var(--queda)';
            document.getElementById('val-premios').innerText = `R$ ${dados.caixa.premios.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}`;
            document.getElementById('val-proventos').innerText = `R$ ${dados.caixa.proventos.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}`;
            document.getElementById('val-troco').innerText = `R$ ${dados.caixa.troco.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}`;
            document.getElementById('val-aportes').innerText = `R$ ${dados.caixa.aportes.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}`;
            document.getElementById('saldo-caixa').innerText = `R$ ${dados.caixaDisponivel.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}`;
            document.getElementById('pode-comprar').innerText = `Pode comprar +${Math.floor(dados.caixaDisponivel / cotacaoGlobal)} ações BBAS3`;
            localStorage.setItem('dados_tourso', JSON.stringify(dados));
        }

        function abrirCompra() {
            let q = prompt("Quantidade comprada (ex: 10):");
            let p = prompt("Preço pago (ex: 25,50):");
            if (q && p) {
                let qtd = parseInt(q);
                let preco = converterParaNumero(p);
                let totalGasto = qtd * preco;
                dados.acoes.push({ qtd: qtd, preco: preco });
                dados.caixaDisponivel -= totalGasto;
                atualizarTela();
            }
        }

        function limparTudo() {
            if (confirm("TOURSO, zerar o aplicativo agora?")) {
                localStorage.removeItem('dados_tourso');
                location.reload();
            }
        }

        function exportar() {
            const blob = new Blob([JSON.stringify(dados)], { type: 'application/json' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `TOURSO_BACKUP.json`;
            a.click();
        }

        // Busca cotação ao iniciar e atualiza a cada 60 segundos
        buscarCotacao();
        setInterval(buscarCotacao, 60000);
    </script>
</body>
</html>
