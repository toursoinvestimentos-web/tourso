<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#00bcd4">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" id="manifest-link">
    <title>TOURSO Invest</title>
    <style>
        :root { --fundo: #2c2f33; --card: #36393f; --ciano: #00bcd4; --branco: #ffffff; --alta: #00e676; --queda: #ff6b6b; }
        * { box-sizing: border-box; }
        body {
            background-color: var(--fundo);
            color: var(--branco);
            font-family: sans-serif;
            margin: 0;
            padding: 20px;
            padding-top: max(20px, env(safe-area-inset-top));
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .card {
            background-color: var(--card);
            border-radius: 15px;
            padding: 20px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            margin-bottom: 20px;
            border-left: 5px solid var(--ciano);
            transition: border-left-color 0.5s;
        }
        .valor-patrimonio { font-size: 2.2em; font-weight: bold; color: var(--ciano); margin: 5px 0; }
        .pilar-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; max-width: 400px; }
        .pilar-card { background-color: var(--card); padding: 15px; border-radius: 10px; border: 1px solid #444; }
        .pilar-label { font-size: 0.75em; color: #aaa; text-transform: uppercase; }
        .btn-acao { background-color: var(--ciano); color: var(--fundo); border: none; padding: 15px; border-radius: 8px; font-weight: bold; width: 100%; max-width: 400px; margin-top: 15px; cursor: pointer; font-size: 1em; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-left: 4px; flex-shrink: 0; }
        .area-botoes-inferior { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; width: 100%; max-width: 400px; margin-top: 30px; margin-bottom: 40px; }
        .btn-discreto { background: none; border: 1px solid #555; color: #555; font-size: 0.6em; padding: 8px 10px; border-radius: 5px; cursor: pointer; font-weight: bold; text-transform: uppercase; }

        /* Modal */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.88); z-index: 100; justify-content: center; align-items: center; padding: 20px; }
        .modal-overlay.ativo { display: flex; }
        .modal-box { background: var(--card); border-radius: 15px; padding: 25px; width: 100%; max-width: 380px; border-top: 4px solid var(--ciano); max-height: 90vh; overflow-y: auto; }
        .modal-box h3 { color: var(--ciano); margin: 0 0 20px; font-size: 0.95em; text-transform: uppercase; }
        .modal-campo { margin-bottom: 14px; }
        .modal-campo label { font-size: 0.72em; color: #aaa; display: block; margin-bottom: 5px; text-transform: uppercase; }
        .modal-campo input { background: var(--fundo); border: 1px solid #555; border-radius: 8px; color: var(--branco); padding: 11px; width: 100%; font-size: 1em; }
        .modal-btns { display: flex; gap: 10px; margin-top: 20px; }
        .modal-btns button { flex: 1; padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; font-size: 0.9em; }
        .btn-salvar { background: var(--ciano); color: var(--fundo); }
        .btn-cancelar { background: #444; color: var(--branco); }

        /* Monitor */
        .barra-container { background: #1a1c1f; border-radius: 10px; height: 14px; margin: 10px 0 4px; position: relative; overflow: visible; }
        .barra-fill { height: 100%; border-radius: 10px; transition: width 0.6s, background 0.5s; }
        .barra-marker { position: absolute; top: -2px; width: 18px; height: 18px; border-radius: 50%; border: 2px solid var(--branco); transition: left 0.6s, background 0.5s; transform: translateX(-50%); }
        .monitor-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
        .monitor-item { background: rgba(0,0,0,0.2); padding: 8px 10px; border-radius: 8px; }
        .monitor-item-label { font-size: 0.63em; color: #aaa; text-transform: uppercase; }
        .monitor-item-val { font-size: 1em; font-weight: bold; margin-top: 3px; }
        .monitor-phrase { font-size: 0.82em; font-weight: bold; margin-top: 10px; text-align: center; padding: 8px 10px; border-radius: 8px; background: rgba(0,0,0,0.25); }

        #banner-install { display: none; position: fixed; bottom: 0; left: 0; right: 0; background: var(--ciano); color: var(--fundo); padding: 14px 20px; z-index: 200; align-items: center; justify-content: space-between; font-weight: bold; font-size: 0.9em; }
        #banner-install.visivel { display: flex; }
        #banner-install button { background: var(--fundo); color: var(--ciano); border: none; border-radius: 6px; padding: 8px 14px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div id="banner-install">
        <span>📲 Instalar TOURSO como app</span>
        <button onclick="instalarApp()">INSTALAR</button>
    </div>

    <div style="display:flex; justify-content:space-between; align-items:center; width:100%; max-width:400px; margin-bottom:15px;">
        <svg width="95" height="47" viewBox="0 0 400 220">
            <rect x="80" y="40" width="240" height="15" fill="#00bcd4"/>
            <polygon points="200,60 170,110 230,110" fill="#00bcd4"/>
            <text x="200" y="165" font-family="Arial" font-size="65" font-weight="bold" fill="white" text-anchor="middle">TOURSO</text>
            <text x="200" y="200" font-family="Arial" font-size="28" fill="#00bcd4" text-anchor="middle">Investimentos</text>
        </svg>
        <div style="text-align:right;">
            <div style="font-size:0.65em; color:#aaa; text-transform:uppercase;">Opção Ativa</div>
            <div id="header-opcao" style="font-size:1.1em; font-weight:bold; color:var(--ciano); margin-top:2px;">— sem setup —</div>
        </div>
    </div>

    <div id="card-monitor" class="card" style="border-left-color:#444; cursor:pointer;" onclick="abrirSetup()">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
            <div class="pilar-label">Monitor de Venda Coberta</div>
            <span style="font-size:1.2em;">⚙️</span>
        </div>
        <div id="monitor-conteudo" style="text-align:center; padding:14px 0; color:#555; font-size:0.85em;">
            Toque para configurar sua operação
        </div>
    </div>

    <div class="card">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <div class="pilar-label">Posição BBAS3</div>
            <div style="font-size:0.8em; color:var(--ciano); display:flex; align-items:center; font-weight:bold; gap:4px;">
                R$ <span id="txt-cotacao">--</span>
                <span id="status-bolinha" class="status-dot" style="background:#f1c40f;"></span>
            </div>
        </div>
        <div id="total-acoes-valor" class="valor-patrimonio">R$ 0,00</div>
        <div id="rent-tag" style="font-weight:bold; font-size:0.9em; color:var(--alta);">0,00%</div>
        <div style="display:flex; justify-content:space-between; font-size:0.9em; margin-top:10px; border-top:1px solid #444; padding-top:10px;">
            <span>Ações: <b id="qtd-total">0</b></span>
            <span>PM: <b id="pm-oficial">R$ 0,00</b></span>
        </div>
    </div>

    <div class="card" style="border-left-color:var(--alta);">
        <div class="pilar-label">Conta Investimento</div>
        <div id="saldo-caixa" style="font-size:1.5em; font-weight:bold; margin:5px 0;">R$ 0,00</div>
        <div id="pode-comprar" style="color:var(--alta); font-size:0.85em; font-weight:bold;">+0 ações possíveis</div>
    </div>

    <div class="pilar-grid">
        <div class="pilar-card">
            <div class="pilar-label" style="margin-bottom:10px;">Troco/Troca</div>
            <div id="troco-cofre" style="color:var(--alta); font-weight:bold;">R$ 0,00</div>
            <button class="btn-discreto" style="width:100%; margin-top:5px;" onclick="abrirAcao('troco','guardar')">Guardar</button>
        </div>
        <div class="pilar-card">
            <div class="pilar-label" style="margin-bottom:10px;">Aportes</div>
            <div id="aportes-cofre" style="color:var(--alta); font-weight:bold;">R$ 0,00</div>
            <button class="btn-discreto" style="width:100%; margin-top:5px;" onclick="abrirAcao('aportes','guardar')">Guardar</button>
        </div>
    </div>

    <button class="btn-acao" onclick="abrirCompra()">EFETIVAR COMPRA DO CAIXA</button>

    <div class="area-botoes-inferior">
        <button onclick="exportar()" class="btn-discreto">Salvar Backup</button>
        <button onclick="document.getElementById('input-file').click()" class="btn-discreto">Ler Backup</button>
        <button onclick="limparTudo()" class="btn-discreto">Zerar Tudo</button>
        <input type="file" id="input-file" style="display:none" onchange="importar(this)">
    </div>

    <div class="modal-overlay" id="modal-setup">
        <div class="modal-box">
            <h3>⚙️ Configurar Venda Coberta</h3>
            <div class="modal-campo">
                <label>Código da Opção</label>
                <input type="text" id="inp-codigo" placeholder="Ex: BBASE264" style="text-transform:uppercase">
            </div>
            <div class="modal-campo">
                <label>Quantidade de Ações</label>
                <input type="number" id="inp-qtd" placeholder="Ex: 100">
            </div>
            <div class="modal-campo">
                <label>Preço de Entrada (R$)</label>
                <input type="text" id="inp-entrada" placeholder="Ex: 24,50">
            </div>
            <div class="modal-campo">
                <label>Valor do Strike (R$)</label>
                <input type="text" id="inp-strike" placeholder="Ex: 27,00">
            </div>
            <div class="modal-campo">
                <label>Data Vencimento</label>
                <input type="date" id="inp-vencimento">
            </div>
            <div class="modal-campo">
                <label>Prêmio Recebido (R$)</label>
                <input type="text" id="inp-premio" placeholder="Ex: 1,00">
            </div>
            <div class="modal-btns">
                <button class="btn-cancelar" onclick="fecharSetup()">Cancelar</button>
                <button class="btn-salvar" onclick="salvarSetup()">Salvar</button>
            </div>
        </div>
    </div>

    <script>
    const CHAVE = 'dados_tourso_v3';
    const BASE = { acoes:[], caixaDisponivel:0, troco:{cofre:0}, aportes:{cofre:0}, setup:{codigoOpcao:'',qtdAcoes:0,precoEntrada:0,strike:0,vencimento:'',premioRecebido:0} };
    let dados = JSON.parse(localStorage.getItem(CHAVE)) || JSON.parse(JSON.stringify(BASE));
    let cotacaoAcao = 0;
    let cotacaoOpcao = null;
    let _buscando = false;

    function fmt(n) { return 'R$ ' + parseFloat(n||0).toFixed(2).replace('.',','); }
    function fmtP(n) { return parseFloat(n||0).toFixed(2).replace('.',',') + '%'; }
    function toNum(v) { return v ? parseFloat(String(v).replace(',','.')) : 0; }
    function salvar() { localStorage.setItem(CHAVE, JSON.stringify(dados)); }

    // NOVO MOTOR GOOGLE
    async function buscarPreco(ticker) {
        const cod = ticker.replace('.SA', '');
        const url = `https://api.allorigins.win/get?url=${encodeURIComponent('https://www.google.com/search?q=BVMF:' + cod)}`;
        try {
            const r = await fetch(url);
            const j = await r.json();
            const html = j.contents;
            const match = html.match(/data-value="([\d.]+)"/) || html.match(/<span>R\$\s?([\d,.]+)/);
            if (match) {
                let p = match[1].replace(',', '.');
                return parseFloat(parseFloat(p).toFixed(2));
            }
        } catch (e) { console.log("Erro: " + cod); }
        return null;
    }

    async function buscarCotacao() {
        if (_buscando) return;
        _buscando = true;
        
        const pAcao = await buscarPreco('BBAS3');
        if (pAcao) {
            cotacaoAcao = pAcao;
            document.getElementById('txt-cotacao').innerText = cotacaoAcao.toFixed(2).replace('.',',');
            document.getElementById('status-bolinha').style.background = '#00e676';
        }

        const codOp = dados.setup?.codigoOpcao?.trim();
        if (codOp) {
            const pOp = await buscarPreco(codOp);
            if (pOp) cotacaoOpcao = pOp;
        }

        _buscando = false;
        atualizarTela();
    }

    function atualizarMonitor() {
        const s = dados.setup;
        const el = document.getElementById('monitor-conteudo');
        const card = document.getElementById('card-monitor');
        document.getElementById('header-opcao').innerText = s.codigoOpcao || '— sem setup —';

        if (!s.codigoOpcao || !s.precoEntrada || !s.strike) return;

        const dist = ((s.strike - cotacaoAcao) / cotacaoAcao) * 100;
        const posPct = Math.min(Math.max(((cotacaoAcao - s.precoEntrada)/(s.strike - s.precoEntrada))*100, 0), 100);
        
        let cor = dist < 5 ? '#f1c40f' : (cotacaoAcao >= s.strike ? 'var(--queda)' : 'var(--alta)');
        card.style.borderLeftColor = cor;

        el.innerHTML = `
            <div style="display:flex; justify-content:space-between; font-size:0.8em;">
                <span>Entrada: <b>${fmt(s.precoEntrada)}</b></span>
                <span>Strike: <b>${fmt(s.strike)}</b></span>
            </div>
            <div class="barra-container">
                <div class="barra-fill" style="width:${posPct}%; background:${cor};"></div>
                <div class="barra-marker" style="left:${posPct}%; background:${cor};"></div>
            </div>
            <div class="monitor-grid">
                <div class="monitor-item"><div class="monitor-item-label">Dist. Strike</div><div class="monitor-item-val">${fmtP(dist)}</div></div>
                <div class="monitor-item"><div class="monitor-item-label">Opção Atual</div><div class="monitor-item-val">${cotacaoOpcao ? fmt(cotacaoOpcao) : '—'}</div></div>
            </div>
        `;
    }

    function atualizarTela() {
        const q = dados.acoes.reduce((a,x)=>a+x.qtd, 0);
        const c = dados.acoes.reduce((a,x)=>a+(x.qtd*x.preco), 0);
        const pm = q > 0 ? c/q : 0;
        document.getElementById('total-acoes-valor').innerText = fmt(q * cotacaoAcao);
        document.getElementById('qtd-total').innerText = q;
        document.getElementById('pm-oficial').innerText = fmt(pm);
        document.getElementById('saldo-caixa').innerText = fmt(dados.caixaDisponivel);
        document.getElementById('pode-comprar').innerText = `Pode comprar +${Math.floor(dados.caixaDisponivel/cotacaoAcao || 0)} ações`;
        document.getElementById('troco-cofre').innerText = fmt(dados.troco.cofre);
        document.getElementById('aportes-cofre').innerText = fmt(dados.aportes.cofre);
        atualizarMonitor();
        salvar();
    }

    function abrirSetup() { document.getElementById('modal-setup').classList.add('ativo'); }
    function fecharSetup() { document.getElementById('modal-setup').classList.remove('ativo'); }
    function salvarSetup() {
        dados.setup = {
            codigoOpcao: document.getElementById('inp-codigo').value.toUpperCase(),
            qtdAcoes: parseInt(document.getElementById('inp-qtd').value) || 0,
            precoEntrada: toNum(document.getElementById('inp-entrada').value),
            strike: toNum(document.getElementById('inp-strike').value),
            vencimento: document.getElementById('inp-vencimento').value,
            premioRecebido: toNum(document.getElementById('inp-premio').value)
        };
        cotacaoOpcao = null;
        fecharSetup();
        buscarCotacao();
    }

    function abrirAcao(t, a) {
        let v = toNum(prompt("Valor (R$):"));
        if (v > 0) { dados[t].cofre += v; atualizarTela(); }
    }

    function abrirCompra() {
        let q = parseInt(prompt("Qtd:"));
        let p = toNum(prompt("Preço:"));
        if (q && p) {
            dados.acoes.push({qtd:q, preco:p});
            dados.caixaDisponivel -= (q*p);
            atualizarTela();
        }
    }

    function exportar() {
        const blob = new Blob([JSON.stringify(dados)],{type:'application/json'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `TOURSO_BACKUP.json`;
        a.click();
    }

    function limparTudo() { if(confirm("Zerar tudo?")) { localStorage.clear(); location.reload(); } }

    atualizarTela();
    buscarCotacao();
    setInterval(buscarCotacao, 300000);
    </script>
</body>
</html>
